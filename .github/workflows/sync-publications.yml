name: Sync publications from ORCID

on:
  schedule:
    # 매주 월요일 한국 시각 09:00 (UTC 00:00)
    - cron: '0 0 * * 1'
  workflow_dispatch: # 수동 트리거 (Actions 탭에서 "Run workflow" 버튼)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync from ORCID
        env:
          ORCID_ID: ${{ secrets.ORCID_ID }}
        run: |
          if [ -z "$ORCID_ID" ]; then
            echo "::error::ORCID_ID secret이 설정되지 않았습니다. Repo Settings → Secrets and variables → Actions에서 추가해 주세요."
            exit 1
          fi
          node scripts/sync-orcid.mjs

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/publications.json; then
            echo "✅ 변경 사항 없음 — 커밋 skip"
          else
            git add data/publications.json
            git commit -m "chore: sync publications from ORCID [skip ci]"
            git push
            echo "✅ data/publications.json 업데이트 후 푸시 완료"
          fi
