name: Sync citations from Google Scholar

on:
  schedule:
    # 매주 월요일 한국 시각 09:00 (UTC 00:00)
    - cron: '0 0 * * 1'
  workflow_dispatch: # 수동 트리거 (Actions 탭 "Run workflow")

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # rebase 재시도를 위해 전체 히스토리 필요 (shallow면 rebase 실패)
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync citations from Google Scholar
        # SCHOLAR_ID 미설정 시 data/scholar.json 의 authorId 사용
        run: node scripts/sync-scholar.mjs

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/scholar.json; then
            echo "✅ 변경 사항 없음 — 커밋 skip"
          else
            git add data/scholar.json
            git commit -m "chore: sync citations from Google Scholar [skip ci]"
            # 같은 시각 sync-publications 잡과 main push 경합 → rebase 후 재시도
            for i in 1 2 3; do
              if git push; then
                echo "✅ data/scholar.json 업데이트 후 푸시 완료"
                exit 0
              fi
              echo "⚠️ push 거부됨 (시도 $i/3) — origin/main 위로 rebase 후 재시도"
              # --autostash: 커밋 대상 외 잔여 변경이 있어도 rebase가 중단되지 않도록
              git pull --rebase --autostash origin main
              sleep $((i * 5))
            done
            echo "::error::3회 재시도 후에도 push 실패"
            exit 1
          fi
